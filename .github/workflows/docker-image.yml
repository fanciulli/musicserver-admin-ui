name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image name and tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${REPO_LC}"

          FIRST_TAG="$(git tag --points-at "${GITHUB_SHA}" | head -n1 || true)"

          if [ -n "${FIRST_TAG}" ]; then
            IMAGE_TAG="${FIRST_TAG}"
            echo "Using git tag from commit: ${IMAGE_TAG}"
          else
            REF_SAFE="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's|/|-|g')"
            IMAGE_TAG="${REF_SAFE}"
            echo "No tag on commit, using branch name: ${IMAGE_TAG}"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.image_tag }}
