name: Build Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Resolve Docker tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          firstTag="$(git tag --points-at "${{ github.ref_name }}" | head -n 1)"

          if [[ -n "$firstTag" ]]; then
            dockerTag="$firstTag"
          else
            dockerTag="latest"
          fi

          repoLower="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repoLower}"

          echo "docker_tag=${dockerTag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.docker_tag }}
